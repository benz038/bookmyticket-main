spring:
  application:
    name: bookmyticket

  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: bmt_local
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50

  flyway:
    schemas: bmt_local
    default-schema: bmt_local
    create-schemas: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}

  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: ${LLM_BASE_URL:https://api.groq.com/openai}
      chat:
        options:
          model: ${LLM_MODEL:llama-3.1-8b-instant}
          temperature: 0.3
      embedding:
        transformer:
          enabled: false

server:
  port: ${PORT:8080}

bookmyticket:
  seat-hold-seconds: 300
